[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gui: marks tests that require a QApplication
    stats: marks tests for data statistics module
    todo: marks tests for todo list module
    focus: marks tests for focus timer module
    settings: marks tests for settings module
