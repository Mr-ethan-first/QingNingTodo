services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.3
    container_name: local-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - dev-net

  mysql:
    image: mysql:8.4
    container_name: local-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - MYSQL_DATABASE=testdb
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dev-net

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: local-rabbitmq
    ports:
      - "5704:5672"
      - "5707:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - dev-net

  mongodb:
    image: mongo:8.0
    container_name: local-mongodb
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mongo-data:/data/db
    networks:
      - dev-net

volumes:
  es-data:
  mysql-data:
  rabbitmq-data:
  mongo-data:

networks:
  dev-net:
    driver: bridge
